    <body>

                style="display:none;visibility:hidden"></iframe></noscript>
        <script>
            async function fetchAndDisplayFields() {
                try {
                    const response = await fetch('https://aivelocity011.machinetrader.io/api/reports');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        document.getElementById('csvOutput').innerHTML = '<p>No data available</p>';
                        return;
                    }
                    // Specify the desired column order and display names
                    const headers = [
                        { key: "account_name", label: "account" },
                        { key: "instance", label: "instance" },
                        { key: "paper_live", label: "type" },
                        { key: "start_date", label: "start_date" },
                        { key: "days", label: "days" },
                        { key: "annualized_return_percent", label: "annualized return" },
                        { key: "sharpe_ratio", label: "sharpe ratio" },
                        { key: "link", label: "data sheet" },
                        { key: "chart_url", label: "chart" }
                    ];
                    let html = '<table><thead><tr>';
                    headers.forEach(header => {
                        html += `<th>${header.label}</th>`;
                    });
                    html += '</tr></thead><tbody>';
                    data.forEach(row => {
                        html += '<tr>';
                        headers.forEach(header => {
                            let value = row[header.key];
                            if (header.key === "link" || header.key === "chart_url") {
                                value = value
                                    ? `<a href="${value}" target="_blank">${value}</a>`
                                    : '';
                            }
                            html += `<td>${value !== null && value !== undefined ? value : ''}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    document.getElementById('csvOutput').innerHTML = html;
                } catch (error) {
                    console.error('Error fetching data:', error);
                    let outputDiv = document.getElementById('csvOutput');
                    if (!outputDiv) {
                        outputDiv = document.createElement('div');
                        outputDiv.id = 'csvOutput';
                        document.querySelector('.strategy-card').appendChild(outputDiv);
                    }
                    outputDiv.innerHTML = '<p style="color: red;">Error loading data</p>';
                }
            }
            window.onload = fetchAndDisplayFields;
        </script>
    </body>
