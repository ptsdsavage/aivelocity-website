        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Balance Chart</title>
        <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
        <style>
            body {
                margin: 0;
                padding: 20px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                background-color: #f5f5f5;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
                background: white;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                padding: 20px;
            }

            h1 {
                margin: 0 0 10px 0;
                color: #333;
                font-size: 24px;
            }

            .stats {
                display: flex;
                gap: 30px;
                margin-bottom: 20px;
                padding: 15px;
                background-color: #f9f9f9;
                border-radius: 6px;
                flex-wrap: wrap;
            }

            .stat {
                display: flex;
                flex-direction: column;
            }

            .stat-label {
                font-size: 12px;
                color: #666;
                margin-bottom: 4px;
            }

            .stat-value {
                font-size: 18px;
                font-weight: 600;
                color: #333;
            }

            .stat-value.positive {
                color: #26a69a;
            }

            .stat-value.negative {
                color: #ef5350;
            }

            #chart {
                width: 100%;
                height: 600px;
            }
        </style>

<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WCG69XDQ" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=68d403d02e5fb4c85b1c05b8"

    <body>
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WCG69XDQ" height="0" width="0"
                style="display:none;visibility:hidden"></iframe></noscript>
        <div class="container">
            <h1>Balance Over Time</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Current Balance</span>
                    <span class="stat-value" id="currentBalance">Loading...</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Starting Balance</span>
                    <span class="stat-value" id="startBalance">Loading...</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Min Balance</span>
                    <span class="stat-value" id="minBalance">Loading...</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Max Balance</span>
                    <span class="stat-value" id="maxBalance">Loading...</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Total Change</span>
                    <span class="stat-value" id="totalChange">Loading...</span>
                </div>
            </div>
            <div id="chart"></div>
        </div>
        <script
            src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
        <script>
            // Wait for both DOM and LightweightCharts to load
            window.addEventListener('load', async function () {
                try {
                    const endpoint = `https://reporting.machinetrader.io/api/D1P3S1`;
                    const response = await fetch(endpoint, {
                        headers: {
                            'Authorization': 'Basic ' + btoa('reporting:wCDZcyOm')
                        }
                    });
                    if (!response.ok) {
                        throw new Error(`Failed to load data: ${response.status} ${response.statusText}`);
                    }
                    const csvText = await response.text();
                    console.log('✅ CSV loaded');
                    console.log('First 200 chars of CSV:', csvText.substring(0, 200));
                    // Parse CSV (handles both comma and tab delimiters)
                    function parseCSV(text) {
                        const lines = text.trim().split('\n');
                        // Detect delimiter (tab or comma)
                        const delimiter = lines[0].includes('\t') ? '\t' : ',';
                        console.log('Detected delimiter:', delimiter === '\t' ? 'TAB' : 'COMMA');
                        const headers = lines[0].split(delimiter).map(h => h.trim());
                        console.log('CSV Headers:', headers);
                        return lines.slice(1).map(line => {
                            const values = line.split(delimiter);
                            const row = {};
                            headers.forEach((header, index) => {
                                row[header] = values[index] ? values[index].trim() : '';
                            });
                            return row;
                        });
                    }
                    const csvData = parseCSV(csvText);
                    console.log('Parsed CSV rows:', csvData.length);
                    console.log('First row sample:', csvData[0]);
                    // Function to parse date string to timestamp
                    function parseDate(dateStr) {
                        // Handle format like "12/03/2025 12:13:01 PM"
                        const date = new Date(dateStr);
                        // Lightweight charts expects YYYY-MM-DD format for daily data
                        // or Unix timestamp in seconds for intraday data
                        const timestamp = Math.floor(date.getTime() / 1000);
                        // For debugging
                        if (isNaN(timestamp)) {
                            console.warn('Invalid date:', dateStr);
                        }
                        return timestamp;
                    }
                    // Function to format currency
                    function formatCurrency(value) {
                        const formatted = Math.abs(value).toFixed(2);
                        return value >= 0 ? `$${formatted}` : `-$${formatted}`;
                    }
                    // Find the correct column names (case-insensitive)
                    const firstRow = csvData[0];
                    const dateKey = Object.keys(firstRow).find(k => k.toLowerCase().includes('date') || k.toLowerCase().includes('time'));
                    const balanceKey = Object.keys(firstRow).find(k => k.toLowerCase().includes('balance') || k.toLowerCase().includes('value'));
                    console.log('Detected date column:', dateKey);
                    console.log('Detected balance column:', balanceKey);
                    if (!dateKey || !balanceKey) {
                        throw new Error(`Could not find required columns. Available columns: ${Object.keys(firstRow).join(', ')}`);
                    }
                    // Convert data to chart format
                    const chartData = csvData.map(row => ({
                        time: parseDate(row[dateKey]),
                        value: parseFloat(row[balanceKey])
                    })).filter(d => !isNaN(d.time) && !isNaN(d.value));
                    console.log('Chart data points:', chartData.length);
                    console.log('First chart point:', chartData[0]);
                    console.log('Last chart point:', chartData[chartData.length - 1]);
                    console.log('Sample parsed date:', csvData[0][dateKey], '→', parseDate(csvData[0][dateKey]));
                    // Sort by time
                    chartData.sort((a, b) => a.time - b.time);
                    if (chartData.length === 0) {
                        throw new Error('No valid data found in CSV');
                    }
                    // Calculate statistics
                    const balances = chartData.map(d => d.value);
                    const currentBalance = balances[balances.length - 1];
                    const startBalance = balances[0];
                    const minBalance = Math.min(...balances);
                    const maxBalance = Math.max(...balances);
                    const totalChange = currentBalance - startBalance;
                    // Update stats
                    document.getElementById('currentBalance').textContent = formatCurrency(currentBalance);
                    document.getElementById('currentBalance').className = 'stat-value ' + (currentBalance >= 0 ? 'positive' : 'negative');
                    document.getElementById('startBalance').textContent = formatCurrency(startBalance);
                    document.getElementById('minBalance').textContent = formatCurrency(minBalance);
                    document.getElementById('minBalance').className = 'stat-value ' + (minBalance >= 0 ? 'positive' : 'negative');
                    document.getElementById('maxBalance').textContent = formatCurrency(maxBalance);
                    document.getElementById('maxBalance').className = 'stat-value positive';
                    document.getElementById('totalChange').textContent = formatCurrency(totalChange);
                    document.getElementById('totalChange').className = 'stat-value ' + (totalChange >= 0 ? 'positive' : 'negative');
                    // Create chart
                    const chartElement = document.getElementById('chart');
                    console.log('Creating chart...');
                    console.log('Chart element:', chartElement);
                    console.log('LightweightCharts:', LightweightCharts);
                    console.log('createChart function:', typeof LightweightCharts.createChart);
                    if (typeof LightweightCharts === 'undefined') {
                        throw new Error('LightweightCharts library failed to load');
                    }
                    const chart = LightweightCharts.createChart(chartElement, {
                        width: chartElement.clientWidth,
                        height: 600,
                        layout: {
                            background: { color: '#ffffff' },
                            textColor: '#333',
                        },
                        grid: {
                            vertLines: { color: '#f0f0f0' },
                            horzLines: { color: '#f0f0f0' },
                        },
                        crosshair: {
                            mode: LightweightCharts.CrosshairMode.Normal,
                        },
                        rightPriceScale: {
                            borderColor: '#d1d4dc',
                        },
                        timeScale: {
                            borderColor: '#d1d4dc',
                            timeVisible: true,
                            secondsVisible: true,
                        },
                    });
                    // Create area series
                    console.log('Adding area series...');
                    console.log('Chart object:', chart);
                    console.log('Available methods:', Object.keys(chart));
                    const areaSeries = chart.addAreaSeries({
                        topColor: 'rgba(46, 134, 171, 0.4)',
                        bottomColor: 'rgba(46, 134, 171, 0.0)',
                        lineColor: 'rgba(46, 134, 171, 1)',
                        lineWidth: 2,
                        priceFormat: {
                            type: 'price',
                            precision: 2,
                            minMove: 0.01,
                        },
                    });
                    // Set data
                    console.log('Setting chart data...');
                    console.log('Total points:', chartData.length);
                    console.log('First 5 data points:', chartData.slice(0, 5));
                    console.log('Date range:', new Date(chartData[0].time * 1000).toLocaleString(), 'to', new Date(chartData[chartData.length - 1].time * 1000).toLocaleString());
                    try {
                        areaSeries.setData(chartData);
                        console.log('✅ Data set successfully');
                    } catch (err) {
                        console.error('❌ Error setting chart data:', err);
                        throw err;
                    }
                    // Add zero line
                    const zeroLine = chart.addLineSeries({
                        color: '#ef5350',
                        lineWidth: 1,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                        priceLineVisible: false,
                        lastValueVisible: false,
                    });
                    // Create zero line data
                    const zeroLineData = [
                        { time: chartData[0].time, value: 0 },
                        { time: chartData[chartData.length - 1].time, value: 0 }
                    ];
                    zeroLine.setData(zeroLineData);
                    // Fit content
                    chart.timeScale().fitContent();
                    // Handle window resize
                    window.addEventListener('resize', () => {
                        chart.applyOptions({
                            width: chartElement.clientWidth
                        });
                    });
                    console.log('✅ Chart rendered successfully');
                } catch (error) {
                    console.error('❌ Error:', error);
                    const container = document.querySelector('.container');
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error';
                    errorDiv.textContent = `Error: ${error.message}`;
                    container.insertBefore(errorDiv, container.firstChild);
                }
            });
        </script>
    </body>
</body>
